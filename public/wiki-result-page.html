<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Extractlet - Wiki</title>
  <link rel="stylesheet" href="base.css">
  <style>
    html, body {
      --color-base: #202122;
      --color-bg: white;
      font-family: sans-serif;
      line-height: 1.625;
    }
    img {
      vertical-align: middle;
    }
    .content-box {
      margin-top: 3em;
    } 
    .show-html .html-view,
    .show-md .md-view,
    .show-raw .raw-view {
      display: block;
    }
    .show-html .md-view,
    .show-html .raw-view,
    .show-md .html-view,
    .show-md .raw-view,
    .show-raw .html-view,
    .show-raw .md-view {
      display: none;
    }
    .html-view h1 {
      margin-top: 0;
    }
    /* span.mvar {
      font-style: italic;
    } */
    span.texhtml {
      font-family: "Nimbus Roman No9 L","Times New Roman",Times,serif;
      font-size: 118%;
      line-height: 1;
      font-variant-numeric: lining-nums tabular-nums;
      font-kerning: none;
      white-space: nowrap;
    }
    .raw-text,
    .md-text {
      background: var(--color-bg);
      white-space: pre-wrap;
    }
    .wikinode-titlebar {
      display: flex;
      align-items: center;
      gap: 1em;
      margin: 3em 0 0.25em 0;
      font-size: 1em;
    }
    .html-wikinode-title,
    .md-wikinode-title,
    .raw-wikinode-title {
      margin: 0;
    }
  </style>
  <script src="browser-polyfill.js"></script>
  <script src="wiki-page.js"></script>
</head>

<body>
</body> 

</html>
