<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Extractlet - GitHub</title>
  <link rel="stylesheet" href="base.css">
  <style>
    /* -------- GitHub code table styles --------- */
    .code-table-wrapper {
      overflow-x: auto;
    }
    table.code-table {
      background: #eee;
      border-collapse: collapse;
      font-family: "SFMono-Regular", Consolas, Menlo, monospace;
      width: 100%;
      margin: 0;
    }
    table.code-table td {
      border: none;
      padding: 0 0.6em;
      white-space: pre;
    }
    table.code-table td:first-child { /* Line-number column */
      color: #777;
      border-right: 1px solid #ddd;
    }
    /* table.xlet-code-table td:nth-child(2) { } Code column*/

    markdown-accessiblity-table table {
      width: auto;
    }
  </style>
  <script src="dompurify.js"></script>
  <script src="browser-polyfill.js"></script>
  <script src="sites/hub-page.js"></script>
</head>
<body></body>
</html>
