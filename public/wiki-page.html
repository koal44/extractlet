<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Extractlet - Wiki</title>
  <link rel="stylesheet" href="base.css">
  <style>
    html, body {
      --color-base: #202122;
      --color-bg: white;
      font-family: sans-serif;
      line-height: 1.625;
    }
    img {
      vertical-align: middle;
    }
    /* span.mvar {
      font-style: italic;
    } */
    span.texhtml {
      font-family: "Nimbus Roman No9 L","Times New Roman",Times,serif;
      font-size: 118%;
      line-height: 1;
      font-variant-numeric: lining-nums tabular-nums;
      font-kerning: none;
      white-space: nowrap;
    }

    /* compact navbox layout */
    .xlet-navbox ul {
      list-style: none;
      padding-left: 0;
      margin: 0;
      display: inline-flex;
      flex-wrap: wrap;
      gap: 0.15em 0.8em;
    }
    .xlet-navbox ul li { margin: 0; }
    .xlet-navbox th { text-align: left; }
    .xlet-navbox table { margin: 0; }
  </style>
  <script src="dompurify.js"></script>
  <script src="browser-polyfill.js"></script>
  <script src="sites/wiki-page.js"></script>
</head>

<body>
</body> 

</html>
