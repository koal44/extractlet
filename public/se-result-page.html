<!DOCTYPE html>
<html lang="en">
  
<head>
  <meta charset="UTF-8">
  <title>Extractlet - Stack Exchange</title>
  <link rel="stylesheet" href="base.css">
  <style>
    .top-bar {
      display: flex;
    }
    .top-heading {
      margin: 0;
      line-height: 1
    }
    .perma-link {
      margin: 0.7em 0;
    }
    .post {
      margin-top: 2.5em;
      margin-bottom: 0;
    }
    .post-title {
      margin: 0;
      line-height: 1;
      align-content: center;
    }
    .post-heading {
      display: flex;
      margin-top: 0px;
    }
    .comments {
      line-height: 1.2;
      margin-top: 1.5em;
    }
    .comment-contrib {
      white-space: nowrap;
      margin-left: 0.6em;
      font-size: 0.9em;
    }
    .md-view {
      white-space: pre-wrap;
      line-height: 1.4;
      margin-top: 0.6em;
    }
    .md-view > .post-contribs {
      margin-top: 1.1em;
    }
    .md-view > .comment-body {
      white-space: pre-wrap;
      line-height: 1.1;
    }
    .show-html .html-view,
    .show-md .md-view,
    .show-raw .raw-view {
      display: block;
    }
    .show-html .md-view,
    .show-html .raw-view,
    .show-md .html-view,
    .show-md .raw-view,
    .show-raw .html-view,
    .show-raw .md-view {
      display: none;
    }
    .html-view h1 {
      margin-top: 0;
    }
  </style>
  <script src="browser-polyfill.js"></script>
  <script src="se-page.js"></script>
</head>

<body>
</body>

</html>
