<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../dist/wiki.bundle.js"></script>
  <script src="wiki/gen/_example_manifest.js"></script>
  <script>
    const defaultExample = 'wikiEnwikiTensorString';
    let doc; // iframe document reference

    function loadScripts(callback) {
      const files = exampleManifest.flatMap(ex => 
        ex.rawFileName ? [ex.htmlFileName, ex.rawFileName] : [ex.htmlFileName]
      );

      let loaded = 0;

      for (const file of files) {
        const script = document.createElement('script');
        script.src = `wiki/gen/${file}`;
        console.log(`Loading script: ${script.src}`);
        script.onload = () => {
          loaded++;
          if (loaded === files.length) callback();
        };
        script.onerror = () => {
          console.error(`Failed to load script: ${script.src}`);
        };
        document.head.appendChild(script);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      loadScripts(() => {
        const select = document.getElementById('exampleSelect');
        for (const example of exampleManifest) {
          const opt = document.createElement('option');
          opt.value = example.htmlVar;
          opt.textContent = example.htmlVar.replace(/String$/, '');
          select.appendChild(opt);
        }

        if (exampleManifest.some(ex => ex.htmlVar === defaultExample)) {
          select.value = defaultExample;
          const ex = exampleManifest.find(ex => ex.htmlVar === defaultExample);
          loadExampleIntoIframe(ex);
        }

        select.addEventListener('change', (e) => {
          const selected = exampleManifest.find(ex => ex.htmlVar === e.target.value);
          if (selected) loadExampleIntoIframe(selected);
        });
      });
    });

    function loadExampleIntoIframe(example) {
      const html = window[example.htmlVar];

      if (!html) throw new Error(`Missing HTML string for: ${example.htmlVar}`);

      const iframe = document.getElementById('previewFrame');
      iframe.contentWindow.document.open();
      iframe.contentWindow.document.write(html);
      iframe.contentWindow.document.close();
      doc = iframe.contentWindow.document;
      setBaseUrl(doc);

      if (example.rawVar && window[example.rawVar]) {
        //iframe.contentWindow['exampleRaw'] = window[example.rawVar];
        window['exampleRaw'] = window[example.rawVar];
      }
      document.getElementById('bookmarkletButton').disabled = false;
    }

    function setBaseUrl(doc) {
      const head = doc.head || doc.getElementsByTagName('head')[0];
      if (!head) throw new Error('No head element found in the iframe document.');

      // don't set base if it already exists
      if (head.querySelector('base')) return;

      const canonicalLink = head.querySelector('link[rel="canonical"]');
      if (!canonicalLink) throw new Error('No canonical link found in the iframe document.');
      const url = new URL('.', canonicalLink.href);

      const base = doc.createElement('base');
      base.href = url.href;
      doc.head.appendChild(base);
    }
  </script>
</head>

<body>
  <h1>Wiki Bookmarklet Test</h1>
  <label for="exampleSelect">Choose example:</label>
  <select id="exampleSelect">
    <option disabled selected value="">-- select example --</option>
  </select>
  <button id="bookmarkletButton" onclick="wiki.runBookmarklet(doc)" disabled>Run Bookmarklet</button>
  <iframe id="previewFrame" style="display: block; width: 100%; height: 800px; margin-top: 30px;"></iframe>
</body>
</html>
