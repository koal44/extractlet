<!DOCTYPE html>
<html lang="en">
<head>
  <script src="../../dist/se.bundle.js"></script>
  <script src="se/gen/_example_manifest.js"></script>
  <script>
    const defaultExample = 'seSoUseWinString';
    let doc; // iframe document reference

    function loadScripts(callback) {
      const files = exampleManifest.map(ex => ex.htmlFileName);

      let loaded = 0;

      for (const file of files) {
        const script = document.createElement('script');
        script.src = `se/gen/${file}`;
        console.log(`Loading script: ${script.src}`);
        script.onload = () => {
          loaded++;
          if (loaded === files.length) callback();
        };
        script.onerror = () => {
          console.error(`Failed to load script: ${script.src}`);
        };
        document.head.appendChild(script);
      }
    }

    document.addEventListener('DOMContentLoaded', function () {
      loadScripts(() => {
        const select = document.getElementById('exampleSelect');
        for (const example of exampleManifest) {
          const opt = document.createElement('option');
          opt.value = example.htmlVar;
          opt.textContent = example.htmlVar.replace(/String$/, '');
          select.appendChild(opt);
        }

        const found = exampleManifest.find(ex => ex.htmlVar === defaultExample);
        if (found) {
          select.value = defaultExample;
          loadExampleIntoIframe(found);
        }

        select.addEventListener('change', (e) => {
          const selected = exampleManifest.find(ex => ex.htmlVar === e.target.value);
          if (selected) loadExampleIntoIframe(selected);
        });
      });
    });

    function loadExampleIntoIframe(example) {
      const html = window[example.htmlVar];

      if (!html) throw new Error(`Missing HTML string for: ${example.htmlVar}`);

      const iframe = document.getElementById('previewFrame');
      iframe.contentWindow.document.open();
      iframe.contentWindow.document.write(html);
      iframe.contentWindow.document.close();
      doc = iframe.contentWindow.document;

      document.getElementById('bookmarkletButton').disabled = false;
    }
  </script>
</head>

<body>
  <h1>StackExchange Bookmarklet Test</h1>
  <label for="exampleSelect">Choose example:</label>
  <select id="exampleSelect">
    <option disabled selected value="">-- select example --</option>
  </select>
  <button id="bookmarkletButton" onclick="se.runBookmarklet(doc)" disabled>Run Bookmarklet</button>
  <iframe id="previewFrame" style="display: block; width: 100%; height: 800px; margin-top: 30px;"></iframe>
</body>
</html>
