<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>KaTeX v0.16.25 harness (TeX + mhchem, auto-render)</title>

  <link rel="stylesheet" href="./katex.css">

  <script defer src="./katex.js"></script>

  <script defer src="./contrib/mhchem.js"></script>
  <script
    defer
    src="./contrib/auto-render.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        { left: '$$', right: '$$', display: true },
        { left: '\\[', right: '\\]', display: true },
        { left: '$', right: '$', display: false },
        { left: '\\(', right: '\\)', display: false }
      ],
      throwOnError: true
    });"
  ></script>
</head>

<body>

<div data-xlet-case="inline">
  Inline TeX: $E = mc^2$.
</div>

<div data-xlet-case="block">
  Display TeX:
  $$\int_{-\infty}^{\infty} e^{-x^2}\,dx = \sqrt{\pi}.$$
</div>

<div data-xlet-case="chem">
  Chemistry:
  $\ce{2H2 + O2 -> 2H2O}$.
</div>

<div data-xlet-case="mathml">
  MathML input:
  <math xmlns="http://www.w3.org/1998/Math/MathML">
    <mrow>
      <msup>
        <mi>e</mi>
        <mi>x</mi>
      </msup>
      <mo>=</mo>
      <munder>
        <mo data-mjx-texclass="OP">∑</mo>
        <mrow><mi>n</mi><mo>=</mo><mn>0</mn></mrow>
      </munder>
      <mfrac>
        <msup><mi>x</mi><mi>n</mi></msup>
        <mrow><mi>n</mi><mo>!</mo></mrow>
      </mfrac>
    </mrow>
  </math>
</div>

</body>
</html>
